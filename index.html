<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOP Studio</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  min-height:100vh;
  padding:40px;
  margin:0;

  background:
    radial-gradient(circle at top left,#7dd3fc,transparent 40%),
    radial-gradient(circle at top right,#c084fc,transparent 40%),
    linear-gradient(135deg,#eef4ff,#ffffff);
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.glass{
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(40px);
  border-radius:30px;
  padding:20px;
  border:1px solid rgba(255,255,255,.4);
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input,textarea{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,.3);
  outline:none;
  font-size:14px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:999px;
  background:white;
  cursor:pointer;
  font-weight:600;
  margin-top:5px;
}

.sop{
  margin-top:15px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(20px);
}

.sop h3{
  margin:0 0 10px 0;
}

.delete{
  margin-top:10px;
  background:#ff4d4d;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>SOP Studio</h1>

<div class="glass">
  <input id="title" placeholder="SOP Title">
  <textarea id="steps" placeholder="Write steps..."></textarea>
  <button onclick="saveSOP()">Save SOP</button>
</div>

<div id="list"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ---------------- CONFIG ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "sop-save.firebaseapp.com",
  databaseURL: "https://sop-save-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sop-save",
  storageBucket: "sop-save.appspot.com",
  messagingSenderId: "309153713642",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const sopRef = ref(db, "sops");

/* ---------------- SAVE ---------------- */

window.saveSOP = async function () {
  const title = document.getElementById("title").value.trim();
  const steps = document.getElementById("steps").value.trim();

  if (!title || !steps) return;

  await push(sopRef, {
    title,
    steps,
    created: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("steps").value = "";
};

/* ---------------- LOAD (REALTIME) ---------------- */

function loadSOPs() {
  onValue(sopRef, (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById("list");

    if (!data) {
      list.innerHTML = "<p>No SOPs yet</p>";
      return;
    }

    const items = Object.entries(data)
      .sort((a, b) => b[1].created - a[1].created);

    list.innerHTML = items.map(([id, s]) => `
      <div class="sop">
        <h3>${s.title}</h3>
        <pre>${s.steps}</pre>

        <button class="delete" onclick="deleteSOP('${id}')">
          Delete
        </button>
      </div>
    `).join("");
  });
}

/* ---------------- DELETE ---------------- */

window.deleteSOP = async function (id) {
  await remove(ref(db, "sops/" + id));
};

loadSOPs();

</script>

</body>
</html>
