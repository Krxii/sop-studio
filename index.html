<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Studio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    min-height:100vh;
    padding:40px 20px;

    background:
        radial-gradient(circle at top left,#7dd3fc 0%,transparent 35%),
        radial-gradient(circle at top right,#c084fc 0%,transparent 30%),
        radial-gradient(circle at bottom right,#60a5fa 0%,transparent 35%),
        linear-gradient(135deg,#eef4ff,#f8fafc);

    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:900px;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:48px;
    font-weight:700;
    color:#111827;
}

.header p{
    margin-top:8px;
    color:#4b5563;
}

.glass{
    position:relative;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);

    border:1px solid rgba(255,255,255,.35);

    border-radius:32px;

    box-shadow:
        0 10px 40px rgba(0,0,0,.08),
        inset 0 1px 1px rgba(255,255,255,.8);

    overflow:hidden;
}

.glass::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.55),
            rgba(255,255,255,.08) 40%,
            transparent 60%
        );

    pointer-events:none;
}

.form{
    padding:28px;
}

input,
textarea{
    width:100%;
    border:none;
    outline:none;

    padding:18px;
    margin-bottom:14px;

    border-radius:22px;

    background:rgba(255,255,255,.30);

    backdrop-filter:blur(20px);

    font-size:16px;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.8),
        0 4px 12px rgba(255,255,255,.15);
}

textarea{
    min-height:180px;
    resize:vertical;
}

button{
    border:none;
    cursor:pointer;

    border-radius:999px;

    padding:15px 28px;

    font-size:15px;
    font-weight:600;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.85),
            rgba(255,255,255,.40)
        );

    box-shadow:
        0 8px 24px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.9);

    transition:all .25s ease;
}

button:hover{
    transform:translateY(-2px) scale(1.02);
}

.section-title{
    margin:28px 0 16px;
    font-size:26px;
    color:#111827;
}

.sop-item{
    margin-bottom:18px;
    padding:24px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(35px);

    border-radius:28px;

    border:1px solid rgba(255,255,255,.30);

    box-shadow:
        0 10px 30px rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.7);

    position:relative;
}

.sop-item h3{
    color:#111827;
    margin-bottom:12px;
}

.sop-item pre{
    white-space:pre-wrap;
    font-family:inherit;
    color:#374151;
    line-height:1.6;
}

.delete-btn{
    margin-top:15px;
}

.empty{
    text-align:center;
    padding:30px;
    color:#6b7280;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#6b7280;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>SOP Studio</h1>
        <p>SOP Manager</p>
    </div>

    <div class="glass">
        <div class="form">

            <input
                id="title"
                placeholder="Procedure Title">

            <textarea
                id="steps"
                placeholder="Enter each step on a new line"></textarea>

            <button onclick="saveSOP()">
                Save SOP
            </button>

        </div>
    </div>

    <h2 class="section-title">
        Procedures
    </h2>

    <div id="sopList"></div>

    <div class="footer">
        SOP Studio • Firebase Edition
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onValue,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
    apiKey: "AIzaSyDpoacY3bTDKC93am-HlNCmp9dsKd7xCk8",
    authDomain: "sop-save.firebaseapp.com",
    databaseURL: "https://sop-save-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "sop-save",
    storageBucket: "sop-save.firebasestorage.app",
    messagingSenderId: "309153713642",
    appId: "1:309153713642:web:51f3f3b92d9d88d2fc3693"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const sopRef = ref(db, "sops");

/* SAVE */

window.saveSOP = async function(){

    const title =
        document.getElementById("title").value.trim();

    const steps =
        document.getElementById("steps").value.trim();

    if(!title || !steps){
        alert("Please fill in all fields.");
        return;
    }

    await push(sopRef,{
        title,
        steps,
        created: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("steps").value = "";
};

/* DELETE */

window.deleteSOP = async function(id){

    await remove(
        ref(db,"sops/" + id)
    );

};

/* RENDER */

function renderSOPs(){

    onValue(sopRef,(snapshot)=>{

        const data = snapshot.val();

        const list =
            document.getElementById("sopList");

        if(!data){

            list.innerHTML =
                '<div class="empty">No SOPs saved yet.</div>';

            return;
        }

        const sops = Object.entries(data)
            .sort(
                (a,b)=>
                b[1].created - a[1].created
            );

        list.innerHTML = sops.map(
            ([id,sop]) => `

            <div class="sop-item">

                <h3>${sop.title}</h3>

                <pre>${sop.steps}</pre>

                <small>
                    Created:
                    ${new Date(
                        sop.created
                    ).toLocaleString()}
                </small>

                <br><br>

                <button
                    class="delete-btn"
                    onclick="deleteSOP('${id}')">

                    Delete

                </button>

            </div>

        `
        ).join("");

    });

}

renderSOPs();

</script>




</script>

</body>
</html>
